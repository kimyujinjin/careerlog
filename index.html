<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이력서 아카이브</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
</head>
<body>

<div class="app-wrapper">

  <!-- 헤더 -->
  <header class="app-header">
    <div class="logo">
      <img src="CareerLog.svg" alt="CareerLog" class="logo-img">
    </div>

    <!-- 메인 네비게이션 탭 -->
    <nav class="main-nav">
      <button class="nav-btn active" id="nav-master" onclick="App.switchView('master')">
        커리어
      </button>
      <button class="nav-btn" id="nav-versions" onclick="App.switchView('versions')">
        이력서 관리
        <span class="nav-badge" id="version-count">0</span>
      </button>
    </nav>

    <div class="header-actions">
      <button class="btn-outline" id="ai-key-btn" onclick="AI.openSettingsModal()" title="Gemini API 키 설정">✨ AI 설정</button>
      <button class="btn-outline" onclick="App.exportJSON()">백업 ↓</button>
      <button class="btn-outline" onclick="App.importJSON()">가져오기 ↑</button>
    </div>
  </header>

  <div class="app-body">

    <!-- ── 뷰 1: 마스터 데이터 ── -->
    <div id="view-master" class="view active">
      <!-- 좌측 탭 바 -->
      <div class="master-sidebar">
        <div id="master-tab-bar" class="master-tabs"><!-- JS 렌더 --></div>
      </div>
      <!-- 콘텐츠 -->
      <div class="master-content" id="editor-content"><!-- JS 렌더 --></div>
    </div>

    <!-- ── 뷰 2: 버전 관리 ── -->
    <div id="view-versions" class="view">

      <!-- 화면 2-A: 사이드바 + 그리드 목록 -->
      <div id="version-grid-view" class="vgrid-view">
        <!-- 좌측: 회사 목록 사이드바 -->
        <div class="version-sidebar">
          <div id="version-company-tabs" class="version-company-tabs"><!-- JS 렌더 --></div>
        </div>
        <!-- 우측: 버전 목록 -->
        <div class="version-main">
          <div class="vgrid-header">
            <div class="vgrid-header__left">
              <h2 class="vgrid-title" id="vgrid-title-text">이력서 관리</h2>
            </div>
            <div class="vgrid-header__right">
              <button id="vgrid-header-btn" class="btn-primary" onclick="VersionManager.openCreateCompanyModal()">+ 회사 추가</button>
            </div>
          </div>
          <div class="vgrid-toolbar">
            <div class="vgrid-search">
              <span class="vgrid-search__icon">🔍</span>
              <input type="text" id="vgrid-search-input" placeholder="버전 검색…"
                oninput="VersionManager.filterGrid(this.value)">
            </div>
          </div>
          <div class="vgrid-body">
            <div id="version-grid" class="vgrid"><!-- JS 렌더 --></div>
          </div>
        </div>
      </div>

      <!-- 화면 2-B: 버전 워크스페이스 (숨김) -->
      <div id="version-workspace-view" class="vworkspace-view hidden">

        <!-- 버전 헤더 -->
        <div class="version-header" id="version-header-bar"><!-- JS 렌더 --></div>

        <div class="version-body">
          <!-- 좌: 항목 선택 -->
          <div class="item-selector">
            <div id="item-selector-content"><!-- JS 렌더 --></div>
          </div>

          <!-- 우: 미리보기 -->
          <div class="version-preview">
            <div class="preview-header">
              <span>미리보기</span>
              <button class="btn-sm" onclick="App.print()">인쇄 / PDF</button>
            </div>
            <div class="preview-scroll">
              <div id="preview-frame"><!-- JS 렌더 --></div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- JS: 의존 순서 중요 -->
<script src="js/models.js"></script>
<script src="js/store.js"></script>
<script src="js/renderer.js"></script>
<script src="js/editor.js"></script>
<script src="js/version.js"></script>
<script src="js/ai.js"></script>
<script src="js/app.js"></script>

</body>
</html>
